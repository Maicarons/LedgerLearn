name: ledgerlearn
description: "LedgerLearn - Accounting Learning Simulation App"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.11.0-296.4.beta

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  get: ^4.7.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  get_storage: ^2.1.1
  intl: ^0.20.2
  flutter_markdown_plus: ^1.0.7
  fl_chart: ^1.2.0
  flutter_slidable: ^4.0.3
  path_provider: ^2.1.5
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - README.md
    - CHANGELOG.md
    - knowledge_card/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

    - family: Noto Sans SC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansSC-Bold.ttf
          weight: 700

    - family: Noto Sans KR
      fonts:
        - asset: assets/fonts/NotoSansKR-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansKR-Bold.ttf
          weight: 700
