# Crowdin translation platform configuration for LedgerLearn
# Documentation: https://support.crowdin.com/configuration-file/

"project_id": "895844"
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: .
preserve_hierarchy: true

files:
  # --- App UI translations ---
  - source: /i18n/zh_CN.json
    translation: /i18n/%locale%.json
    type: json

  # --- F-Droid / Fastlane store listing texts ---
  - source: /fastlane/metadata/android/zh-CN/title.txt
    translation: /fastlane/metadata/android/%locale%/title.txt

  - source: /fastlane/metadata/android/zh-CN/short_description.txt
    translation: /fastlane/metadata/android/%locale%/short_description.txt

  - source: /fastlane/metadata/android/zh-CN/full_description.txt
    translation: /fastlane/metadata/android/%locale%/full_description.txt

  - source: /fastlane/metadata/android/zh-CN/changelogs/*.txt
    translation: /fastlane/metadata/android/%locale%/changelogs/%original_file_name%

  # --- Project documentation ---
  - source: /README.md
    translation: /docs/i18n/%locale%/README.md
