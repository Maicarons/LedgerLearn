AutoName: LedgerLearn
Name: LedgerLearn
Summary: Accounting learning simulation app for Chinese Mainland beginners
Description: |
  LedgerLearn is a multilingual accounting education app designed for
  accounting beginners in Chinese Mainland. It teaches double-entry
  bookkeeping through hands-on simulation — vouchers, ledgers, trial
  balances, and financial statements following China's Accounting
  Standards for Business Enterprises (ASBE).

  IMPORTANT: This app is tailored for accounting practices of Chinese
  Mainland and may not apply to other jurisdictions.

  Features:
  * Voucher management with debit/credit validation
  * 59 preset standard accounts per China's ASBE classification
  * General ledger and subsidiary ledger views
  * Trial balance, income statement, and balance sheet
  * 74 trilingual knowledge cards with Markdown rendering
  * CSV/PDF export for all report types
  * Chinese, English, Korean language support
  * Light/dark/system theme modes
  * Offline-first with local storage

