name: Release

on:
  workflow_dispatch:
    inputs:
      bump_level:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major
        default: none
  push:
    tags:
      - 'v*'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.ver.outputs.semver }}
      full: ${{ steps.ver.outputs.full }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: beta

      - run: flutter pub get

      - name: Bump version (dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.bump_level != 'none'
        run: dart run scripts/bump_version.dart ${{ github.event.inputs.bump_level }}

      - name: Sync version
        run: dart run scripts/sync_version.dart

      - name: Read version
        id: ver
        run: |
          SEMVER=$(jq -r '.version' version.json)
          CODE=$(jq -r '.version_code' version.json)
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "full=$SEMVER+$CODE" >> $GITHUB_OUTPUT

      - name: Commit version bump (dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.bump_level != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json pubspec.yaml fdroid/ lib/app/config/app_version.dart
          git commit -m "chore(release): bump version to $SEMVER+$CODE"
          TAG="v$SEMVER"
          git tag "$TAG"
          git push origin master
          git push origin "$TAG"

  build-android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: beta

      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build appbundle --release

      - name: Rename artifacts
        run: |
          V=${{ needs.version.outputs.semver }}
          cp build/app/outputs/flutter-apk/app-release.apk "ledgerlearn-v$V-android.apk"
          cp build/app/outputs/bundle/release/app-release.aab "ledgerlearn-v$V-android.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            ledgerlearn-v${{ needs.version.outputs.semver }}-android.apk
            ledgerlearn-v${{ needs.version.outputs.semver }}-android.aab

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: beta

      - run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake clang libgtk-3-dev ninja-build
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package
        run: |
          V=${{ needs.version.outputs.semver }}
          cd build/linux/x64/release/bundle
          tar -czf "ledgerlearn-v$V-linux-x64.tar.gz" *

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: build/linux/x64/release/bundle/ledgerlearn-v${{ needs.version.outputs.semver }}-linux-x64.tar.gz

  build-web:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: beta

      - run: flutter pub get
      - run: flutter build web --release

      - name: Package
        run: |
          V=${{ needs.version.outputs.semver }}
          cd build/web && zip -r "../../ledgerlearn-v$V-web.zip" *

      - uses: actions/upload-artifact@v4
        with:
          name: web-artifacts
          path: ledgerlearn-v${{ needs.version.outputs.semver }}-web.zip

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: beta

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package
        run: |
          $V = "${{ needs.version.outputs.semver }}"
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "ledgerlearn-v$V-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: ledgerlearn-v${{ needs.version.outputs.semver }}-windows-x64.zip

  build-macos:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: beta

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package
        run: |
          V="${{ needs.version.outputs.semver }}"
          cd build/macos/Build/Products/Release
          zip -ry "ledgerlearn-v$V-macos.zip" ledgerlearn.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: build/macos/Build/Products/Release/ledgerlearn-v${{ needs.version.outputs.semver }}-macos.zip

  build-ios:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: beta

      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

      - name: Package
        run: |
          V="${{ needs.version.outputs.semver }}"
          cd build/ios/iphoneos
          zip -ry "ledgerlearn-v$V-ios-unsigned.zip" Runner.app

      - uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: build/ios/iphoneos/ledgerlearn-v${{ needs.version.outputs.semver }}-ios-unsigned.zip

  release:
    needs:
      - version
      - build-android
      - build-linux
      - build-web
      - build-windows
      - build-macos
      - build-ios
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-artifacts'
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Create GitHub Release (tag push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            ledgerlearn-v*.apk
            ledgerlearn-v*.aab
            ledgerlearn-v*-linux-x64.tar.gz
            ledgerlearn-v*-web.zip
            ledgerlearn-v*-windows-x64.zip
            ledgerlearn-v*-macos.zip
            ledgerlearn-v*-ios-unsigned.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.version.outputs.semver }}
          tag_name: v${{ needs.version.outputs.semver }}
          body_path: CHANGELOG.md
          files: |
            ledgerlearn-v*.apk
            ledgerlearn-v*.aab
            ledgerlearn-v*-linux-x64.tar.gz
            ledgerlearn-v*-web.zip
            ledgerlearn-v*-windows-x64.zip
            ledgerlearn-v*-macos.zip
            ledgerlearn-v*-ios-unsigned.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
