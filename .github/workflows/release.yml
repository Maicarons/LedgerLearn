name: Release

on:
  workflow_dispatch:
    inputs:
      bump_level:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major
        default: none
  push:
    tags:
      - 'v*'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.ver.outputs.semver }}
      full: ${{ steps.ver.outputs.full }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: beta

      - run: flutter pub get

      - name: Bump version (dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.bump_level != 'none'
        run: dart run scripts/bump_version.dart ${{ github.event.inputs.bump_level }}

      - name: Sync version
        run: dart run scripts/sync_version.dart

      - name: Read version
        id: ver
        run: |
          SEMVER=$(jq -r '.version' version.json)
          CODE=$(jq -r '.version_code' version.json)
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "full=$SEMVER+$CODE" >> $GITHUB_OUTPUT

      - name: Commit version bump (dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.bump_level != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json pubspec.yaml fdroid/ lib/app/config/app_version.dart
          git commit -m "chore(release): bump version to $SEMVER+$CODE"
          TAG="v$SEMVER"
          git tag "$TAG"
          git push origin master
          git push origin "$TAG"

  build-android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: beta

      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: beta

      - run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake clang libgtk-3-dev ninja-build
      - run: flutter pub get
      - run: flutter build linux --release
      - run: cd build/linux/x64/release/bundle && tar -czf ledgerlearn-linux-x64.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: build/linux/x64/release/bundle/ledgerlearn-linux-x64.tar.gz

  build-web:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: beta

      - run: flutter pub get
      - run: flutter build web --release
      - run: cd build/web && zip -r ../../ledgerlearn-web.zip *

      - uses: actions/upload-artifact@v4
        with:
          name: web-artifacts
          path: ledgerlearn-web.zip

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: beta

      - run: flutter pub get
      - run: flutter build windows --release
      - run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ledgerlearn-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: ledgerlearn-windows-x64.zip

  build-macos:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: beta

      - run: flutter pub get
      - run: flutter build macos --release
      - run: cd build/macos/Build/Products/Release && zip -ry ledgerlearn-macos.zip ledgerlearn.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: build/macos/Build/Products/Release/ledgerlearn-macos.zip

  build-ios:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: beta

      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: build/ios/iphoneos/Runner.app

  release:
    needs:
      - version
      - build-android
      - build-linux
      - build-web
      - build-windows
      - build-macos
      - build-ios
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-artifacts'
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Create GitHub Release (tag push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release.apk
            app-release.aab
            ledgerlearn-linux-x64.tar.gz
            ledgerlearn-web.zip
            ledgerlearn-windows-x64.zip
            ledgerlearn-macos.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.version.outputs.semver }}
          tag_name: v${{ needs.version.outputs.semver }}
          files: |
            app-release.apk
            app-release.aab
            ledgerlearn-linux-x64.tar.gz
            ledgerlearn-web.zip
            ledgerlearn-windows-x64.zip
            ledgerlearn-macos.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
